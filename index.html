<!DOCTYPE html>
<html lang="pt-br"> 
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Landing Page de Venda</title>
  <style>
body {
  margin: 0;
  background: #0f0f0f;
  height: 300vh;
}

.div1 {
  margin: 150px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.h1 {
  color: white;
  text-shadow:0 0 20px red;

}


.button1 {
  font-size: 30px;
  height: 50px;
  width: 170px;
  background: linear-gradient(135deg, #2563EB, #93C5FD);
  border: solid 1px red;
  border-radius: 30px;
  animation: rgb 16s infinite;
    animation: active 2s infinite;
  
  filter: grayscale(100%);
  box-shadow:0 0 20px;
  
}



.button2 {
  font-size: 30px;
  height: 50px;
  width: 170px;
  background: linear-gradient(135deg, #2563EB, #93C5FD);
  border: solid 1px red;
  border-radius: 30px;
  transition: transform 0.2s;
  box-shadow: 0 0 20px;
}

/* ✅ Seletor corrigido de .button1 para .button2 */
.button2:active {
  transform: translateY(-10px) scale(1.1);
}

/* ✅ Keyframe criado para o animation: rgb funcionar */
@keyframes rgb {
  0%   { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}

@keyframes rgb {
  0% { border: solid 5px rgb(255, 0, 0); }
  33% { border: solid 4px rgb(0, 255, 0); }
  66% { border: solid 3px rgb(0, 0, 255); }
  100% { border: solid 4px rgb(255, 255, 0); }
}
  </style>
</head>
<body>
  <header>
    <h1 class="h1">
     VOCÊ QUER NAMORA COMIGO?
    </h1>
  </header>

  <main>
<div class="div1">
  <button class="button1" onmouseover="escapar(this)" onclick="alert('Você não tem escolha, e nunca vai ter😌!')">
    <strong>NÃO</strong>
  </button>
</div>

<div class="div1">
  <button class="button2" onclick="alert('Você apareceu na minha vida de um jeito simples, mas acabou ficando de um jeito enorme 💫\n\nSeu sorriso ilumina tudo ao redor e transforma até os dias mais comuns em momentos melhores 😊\n\nTem uma leveza na sua presença que acalma, anima e faz tudo parecer mais fácil sem nem você perceber ❤️\n\nÉ impressionante como pequenas coisas em você acabam fazendo uma diferença gigante na minha forma de ver o dia e até a vida\n\nEu não sei explicar direito, mas é como se você trouxesse uma paz boa junto com uma alegria inesperada ✨\n\nNo fim, só queria dizer que é muito difícil não te admirar… e ainda mais difícil não sorrir quando penso em você 💙')">
    <strong>SIM</strong>
  </button>
</div>

</main>

<script>
  function escapar(btn) {
    const maxX = window.innerWidth - btn.offsetWidth;
    const maxY = window.scrollY + window.innerHeight - btn.offsetHeight;
    const minY = window.scrollY;

    const novoX = Math.random() * maxX;
    const novoY = minY + Math.random() * (maxY - minY);

    btn.style.position = 'fixed';
    btn.style.left = novoX + 'px';
    btn.style.top = (novoY - window.scrollY) + 'px';
    btn.style.transition = 'left 0.3s, top 0.3s';
  }
</script>

</body>
</html>
